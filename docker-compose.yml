services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: portfolio
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - portfolio_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uportfolio", "-pportfolio"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
      - api_node_modules:/var/www/html/node_modules
      - ./portfolio-data.md:/var/www/portfolio-data.md:ro
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: "Portfolio Admin"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: portfolio
      DB_USERNAME: portfolio
      DB_PASSWORD: portfolio
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: log
      ADMIN_NAME: "Maicon Bruno"
      ADMIN_EMAIL: devmaiconrodrigues@gmail.com
      ADMIN_PASSWORD: admin123456
      FILESYSTEM_DISK: public
      PORTFOLIO_DATA_PATH: /var/www/portfolio-data.md

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - ./packages/types:/packages/types
      - web_next:/app/.next
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_DEFAULT_LOCALE: pt
      WATCHPACK_POLLING: "true"

volumes:
  portfolio_mysql:
  api_vendor:
  api_node_modules:
  web_next:
